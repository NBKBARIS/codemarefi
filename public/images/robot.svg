<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0); }
    }
    @keyframes blink {
      0%, 96%, 98% { transform: scaleY(1); }
      97% { transform: scaleY(0.1); }
    }
    @keyframes antenna {
      0% { fill: #ff4d4d; filter: drop-shadow(0 0 2px red); }
      50% { fill: #ffe6e6; filter: drop-shadow(0 0 8px red); }
      100% { fill: #ff4d4d; filter: drop-shadow(0 0 2px red); }
    }
    .robot { animation: float 2s ease-in-out infinite; transform-origin: center; }
    .eyes { animation: blink 3s infinite; transform-origin: center; }
    .bulb { animation: antenna 1s infinite; }
  </style>
  <g class="robot" transform="translate(10, 15)">
    <!-- Antenna -->
    <rect x="38" y="0" width="4" height="15" fill="#666" />
    <circle cx="40" cy="0" r="6" class="bulb" />
    
    <!-- Ears -->
    <rect x="8" y="35" width="8" height="20" rx="2" fill="#4d4d4d" />
    <rect x="64" y="35" width="8" height="20" rx="2" fill="#4d4d4d" />
    
    <!-- Head -->
    <rect x="16" y="15" width="48" height="45" rx="8" fill="#5865F2" />
    <rect x="16" y="15" width="24" height="45" rx="8" fill="#4752C4" />
    
    <!-- Face Plate -->
    <rect x="22" y="25" width="36" height="25" rx="4" fill="#1a1a1a" />
    
    <!-- Eyes -->
    <g class="eyes">
      <circle cx="32" cy="37" r="4" fill="#00ffcc" />
      <circle cx="48" cy="37" r="4" fill="#00ffcc" />
    </g>
    
    <!-- Mouth -->
    <rect x="35" y="52" width="10" height="3" rx="1" fill="#1a1a1a" />
  </g>
</svg>
