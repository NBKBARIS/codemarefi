<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    @keyframes fly {
      0% { transform: translate(0, 0) rotate(45deg); }
      50% { transform: translate(5px, -5px) rotate(45deg); }
      100% { transform: translate(0, 0) rotate(45deg); }
    }
    @keyframes fire {
      0% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(1.5); opacity: 0.8; }
      100% { transform: scaleY(1); opacity: 1; }
    }
    .rocket { animation: fly 1.5s ease-in-out infinite; transform-origin: center; transform: rotate(45deg); }
    .flame { animation: fire 0.3s ease-in-out infinite alternate; transform-origin: top; }
  </style>
  <g class="rocket" transform="translate(10, 10)">
    <!-- Body -->
    <path d="M 40 80 Q 20 40 50 10 Q 80 40 60 80 Z" fill="#e6e6e6" />
    <path d="M 50 10 Q 80 40 60 80 L 50 80 Z" fill="#cccccc" />
    <!-- Window -->
    <circle cx="50" cy="45" r="10" fill="#1a1a1a" stroke="#4d4d4d" stroke-width="3"/>
    <!-- Fins -->
    <path d="M 40 70 L 20 90 L 40 80 Z" fill="#e60000"/>
    <path d="M 60 70 L 80 90 L 60 80 Z" fill="#cc0000"/>
    <!-- Flame -->
    <g class="flame">
      <path d="M 45 80 L 50 100 L 55 80 Z" fill="#ff9900"/>
      <path d="M 47 80 L 50 90 L 53 80 Z" fill="#ffeb3b"/>
    </g>
  </g>
</svg>
