<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; filter: drop-shadow(0 0 10px red); }
      100% { transform: scale(1); opacity: 1; }
    }
    .siren { animation: pulse 1s infinite; transform-origin: center; }
  </style>
  <g class="siren">
    <path d="M50 10 L10 80 L90 80 Z" fill="#e60000" stroke="#ff4d4d" stroke-width="4" stroke-linejoin="round"/>
    <rect x="46" y="35" width="8" height="25" fill="#fff" rx="4"/>
    <circle cx="50" cy="70" r="5" fill="#fff"/>
  </g>
</svg>
